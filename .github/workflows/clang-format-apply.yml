name: Apply clang-format

on:
  pull_request:
    types: [labeled]
    branches: ["master"]

jobs:
  clang-format-apply:
    name: Apply clang-format
    runs-on: ubuntu-latest
    if: github.event.label.name == 'apply-clang-format' && github.event.pull_request.draft == false
    permissions:
      contents: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install clang-format 21.1.8 (Python wheel in venv)
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install "clang-format==21.1.8"
          .venv/bin/clang-format --version

      - name: Get list of modified source files
        id: files
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          BASE_REF="${BASE_REF#refs/heads/}"
          git fetch origin "$BASE_REF"

          FILES="$(
            git diff --name-only -z "origin/${BASE_REF}...HEAD" \
              | tr '\0' '\n' \
              | grep -E '^(src|unit_tests)/.*\.(h|hpp|tpp|cpp)$' || true
          )"

          echo "$FILES"
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Apply clang-format in-place
        if: steps.files.outputs.files != ''
        run: |
          echo "Formatting files:"
          echo "${{ steps.files.outputs.files }}"

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            .venv/bin/clang-format -i "$file"
          done <<'EOF'
          ${{ steps.files.outputs.files }}
          EOF

      - name: Commit and push formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No formatting changes needed."
          else
            git add -u
            git commit -m "style: apply clang-format to changed files"
            git push
          fi
